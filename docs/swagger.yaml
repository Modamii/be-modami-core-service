basePath: /v1/core-services
definitions:
  domain.CategoryOrder:
    properties:
      id:
        type: string
      sort_order:
        type: integer
    type: object
  dto.CreateProductRequest:
    properties:
      brand:
        type: string
      category_id:
        type: string
      color:
        type: string
      condition:
        enum:
        - new
        - like_new
        - good
        - fair
        type: string
      credit_cost:
        type: integer
      description:
        maxLength: 5000
        minLength: 20
        type: string
      hashtags:
        items:
          type: string
        maxItems: 10
        type: array
      images:
        items:
          $ref: '#/definitions/dto.ImageInput'
        maxItems: 6
        minItems: 1
        type: array
      material:
        type: string
      price:
        minimum: 1000
        type: integer
      size:
        type: string
      title:
        maxLength: 200
        minLength: 5
        type: string
    required:
    - category_id
    - condition
    - description
    - images
    - price
    - size
    - title
    type: object
  dto.ImageInput:
    properties:
      height:
        type: integer
      position:
        type: integer
      url:
        type: string
      width:
        type: integer
    required:
    - url
    type: object
  dto.ResubmitRequest:
    properties:
      brand:
        type: string
      category_id:
        type: string
      color:
        type: string
      condition:
        enum:
        - new
        - like_new
        - good
        - fair
        type: string
      description:
        maxLength: 5000
        minLength: 20
        type: string
      hashtags:
        items:
          type: string
        maxItems: 10
        type: array
      images:
        items:
          $ref: '#/definitions/dto.ImageInput'
        maxItems: 6
        minItems: 1
        type: array
      material:
        type: string
      note:
        type: string
      price:
        minimum: 1000
        type: integer
      size:
        type: string
      title:
        maxLength: 200
        minLength: 5
        type: string
    type: object
  dto.UpdateProductRequest:
    properties:
      brand:
        type: string
      category_id:
        type: string
      color:
        type: string
      condition:
        enum:
        - new
        - like_new
        - good
        - fair
        type: string
      credit_cost:
        type: integer
      description:
        maxLength: 5000
        minLength: 20
        type: string
      hashtags:
        items:
          type: string
        maxItems: 10
        type: array
      images:
        items:
          $ref: '#/definitions/dto.ImageInput'
        maxItems: 6
        minItems: 1
        type: array
      material:
        type: string
      price:
        minimum: 1000
        type: integer
      size:
        type: string
      title:
        maxLength: 200
        minLength: 5
        type: string
    type: object
  handler.CreateCategoryRequest:
    properties:
      icon:
        type: string
      name:
        type: string
      name_vi:
        type: string
      parent_id:
        type: string
      slug:
        type: string
      sort_order:
        type: integer
    required:
    - name
    - name_vi
    - slug
    type: object
  handler.StandardErrorEnvelope:
    properties:
      error: {}
      meta: {}
      success:
        type: boolean
    type: object
  handler.StandardSuccessEnvelope:
    properties:
      data: {}
      meta: {}
      success:
        type: boolean
    type: object
  handler.UpdateCategoryRequest:
    properties:
      icon:
        type: string
      name:
        type: string
      name_vi:
        type: string
      slug:
        type: string
      sort_order:
        type: integer
    type: object
host: localhost:8087
