basePath: /v1/core-services
definitions:
  github_com_modami_core-service_internal_domain.CategoryOrder:
    properties:
      id:
        type: string
      sort_order:
        type: integer
    type: object
  github_com_modami_core-service_internal_dto.CancelOrderRequest:
    properties:
      reason:
        type: string
    required:
    - reason
    type: object
  github_com_modami_core-service_internal_dto.CreateOrderRequest:
    properties:
      product_id:
        type: string
      shipping:
        $ref: '#/definitions/github_com_modami_core-service_internal_dto.CreateShippingInput'
    required:
    - product_id
    - shipping
    type: object
  github_com_modami_core-service_internal_dto.CreateProductRequest:
    properties:
      brand:
        type: string
      category_id:
        type: string
      color:
        type: string
      condition:
        enum:
        - new
        - like_new
        - good
        - fair
        type: string
      credit_cost:
        type: integer
      description:
        maxLength: 5000
        minLength: 20
        type: string
      hashtags:
        items:
          type: string
        maxItems: 10
        type: array
      images:
        items:
          $ref: '#/definitions/github_com_modami_core-service_internal_dto.ImageInput'
        maxItems: 6
        minItems: 1
        type: array
      material:
        type: string
      price:
        minimum: 1000
        type: integer
      size:
        type: string
      title:
        maxLength: 200
        minLength: 5
        type: string
    required:
    - category_id
    - condition
    - description
    - images
    - price
    - size
    - title
    type: object
  github_com_modami_core-service_internal_dto.CreateShippingInput:
    properties:
      address:
        type: string
      district:
        type: string
      name:
        type: string
      phone:
        type: string
      province:
        type: string
      ward:
        type: string
    required:
    - address
    - district
    - name
    - phone
    - province
    - ward
    type: object
  github_com_modami_core-service_internal_dto.ImageInput:
    properties:
      height:
        type: integer
      position:
        type: integer
      url:
        type: string
      width:
        type: integer
    required:
    - url
    type: object
  github_com_modami_core-service_internal_dto.ResubmitRequest:
    properties:
      brand:
        type: string
      category_id:
        type: string
      color:
        type: string
      condition:
        enum:
        - new
        - like_new
        - good
        - fair
        type: string
      description:
        maxLength: 5000
        minLength: 20
        type: string
      hashtags:
        items:
          type: string
        maxItems: 10
        type: array
      images:
        items:
          $ref: '#/definitions/github_com_modami_core-service_internal_dto.ImageInput'
        maxItems: 6
        minItems: 1
        type: array
      material:
        type: string
      note:
        type: string
      price:
        minimum: 1000
        type: integer
      size:
        type: string
      title:
        maxLength: 200
        minLength: 5
        type: string
    type: object
  github_com_modami_core-service_internal_dto.ShipOrderRequest:
    properties:
      shipping_provider:
        type: string
      tracking_code:
        type: string
    required:
    - shipping_provider
    - tracking_code
    type: object
  github_com_modami_core-service_internal_dto.UpdateProductRequest:
    properties:
      brand:
        type: string
      category_id:
        type: string
      color:
        type: string
      condition:
        enum:
        - new
        - like_new
        - good
        - fair
        type: string
      credit_cost:
        type: integer
      description:
        maxLength: 5000
        minLength: 20
        type: string
      hashtags:
        items:
          type: string
        maxItems: 10
        type: array
      images:
        items:
          $ref: '#/definitions/github_com_modami_core-service_internal_dto.ImageInput'
        maxItems: 6
        minItems: 1
        type: array
      material:
        type: string
      price:
        minimum: 1000
        type: integer
      size:
        type: string
      title:
        maxLength: 200
        minLength: 5
        type: string
    type: object
  internal_adapter_handler.CreateCategoryRequest:
    properties:
      icon:
        type: string
      name:
        type: string
      name_vi:
        type: string
      parent_id:
        type: string
      slug:
        type: string
      sort_order:
        type: integer
    required:
    - name
    - name_vi
    - slug
    type: object
  internal_adapter_handler.CreatePackageRequest:
    properties:
      badge_name:
        type: string
      code:
        type: string
      credits_per_month:
        type: integer
      featured_slots:
        type: integer
      name:
        type: string
      price_monthly:
        type: integer
      price_yearly:
        type: integer
      priority_support:
        type: boolean
      search_boost:
        type: boolean
      search_priority:
        type: boolean
      sort_order:
        type: integer
      tier:
        type: integer
    required:
    - code
    - name
    type: object
  internal_adapter_handler.StandardErrorEnvelope:
    properties:
      error: {}
      meta: {}
      success:
        type: boolean
    type: object
  internal_adapter_handler.StandardSuccessEnvelope:
    properties:
      data: {}
      meta: {}
      success:
        type: boolean
    type: object
  internal_adapter_handler.UpdateCategoryRequest:
    properties:
      icon:
        type: string
      name:
        type: string
      name_vi:
        type: string
      slug:
        type: string
      sort_order:
        type: integer
    type: object
