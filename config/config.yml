app:
  name: "Modami core"
  version: "1.0.0"
  environment: "development"
  debug: true
  port: 8087
  host: "localhost"
  swagger_host: "localhost:8087"
  shutdown_timeout: "30s"
  read_timeout: "30s"
  write_timeout: "30s"
  idle_timeout: "120s"
  allow_credentials: true
  allowed_origins:
    - "http://localhost:5173"
    - "http://localhost:3000"
    - "http://localhost:8080"
    - "http://localhost:8081"

keycloak:
  jwks_url: "http://localhost:8180/realms/modami/protocol/openid-connect/certs"

mongodb:
  uri: "mongodb://localhost:27017"
  database: "modami-core-service"
  timeout: 10s
  max_pool_size: 100
  min_pool_size: 0
  max_idle_time: 900s
  retry_writes: true
  read_concern: "majority"
  write_concern: "majority"
  enable_logging: true

redis:
  host: "localhost"
  port: 6379
  database: 0
  rate_limit_database: 5
  ttl: 259200s
  pool_size: 100
  pass: ""
  user_name: ""
  write_timeout: 600s
  read_timeout: 600s
  dial_timeout: 600s
  tls_config:
    insecure_skip_verify: true

kafka:
  broker_list: "localhost:9092"
  enable: true
  tls_enable: false
  partition: 1
  partitioner: "random"
  sasl_producer_username: ""
  sasl_producer_password: ""
  sasl_consumer_username: ""
  sasl_consumer_password: ""
  user_activated_topic_name: "modami.auth.user.activated"
  consumer_group: "user-service-group"
  client_id: "user-service"
  env: "local"

elasticsearch:
  enable: false
  url: ""
  username: ""
  password: ""
  index: ""

observability:
  service_name: "core-service"
  service_version: "1.0.0"
  environment: "development"
  log_level: "info"
  otlp_endpoint: ""
  otlp_insecure: true
