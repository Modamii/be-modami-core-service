services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - ENV=development
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB_NAME=modami
      - JWT_SECRET=dev-secret-key
      - ALLOWED_ORIGINS=http://localhost:3000
      - LOG_LEVEL=debug
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo-express:
    image: mongo-express:latest
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://mongo:27017
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
